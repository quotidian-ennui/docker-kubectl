version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    open-pull-requests-limit: 10
    rebase-strategy: disabled
    schedule:
      interval: "cron"
      cronjob: "23 4 * * 0,2,4"
    allow:
      - dependency-type: all
    commit-message:
      prefix: "deps(actions): "
  - package-ecosystem: "docker"
    directory: "/"
    rebase-strategy: disabled
    schedule:
      interval: "cron"
      cronjob: "23 3 * * 0,2,4"
    allow:
      - dependency-type: "all"
    commit-message:
      prefix: "deps(docker-image): "
